backend:
  name: github
  repo: hello-snamy/jekyll_blog_posts
  branch: main
  base_url: https://suresh-issue-82.dcycleproject.org
  auth_endpoint: /auth/github/repo/69c3fc78befd34da90d0c028

media_folder: "docs/media"
public_folder: "/media"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "awards"
    label: "Awards"
    files:
      - file: "docs/_data/awards.yml"
        label: "Awards List"
        name: "awards_list"
        fields:
          - label: "Awards"
            name: "items"
            widget: "list"
            fields:
              - label: "Name"
                name: "name"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "French", name: "fr", widget: "string" }
              - label: "Media"
                name: "media"
                widget: "object"
                fields:
                  - { label: "Image", name: "path", widget: "image" }

                  - label: "Alt Text"
                    name: "alt"
                    widget: "object"
                    fields:
                      - { label: "English", name: "en", widget: "string" }
                      - { label: "French", name: "fr", widget: "string" }
